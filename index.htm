    <header>
        <h1><img src="./android-chrome-512x512.png" />Travel <span>Tools</span></h1>
        <p>Travel calculator · MXN / USD</p>
        <div class="buttons">
            <button class="wide" id="install-banner"><svg>
                    <use href="#icon-install" />
                </svg>Install App</button>
            <button class="wide" id="share-btn"><svg>
                    <use href="#icon-share" />
                </svg> Share App</button>
        </div>
    </header>

    <!-- EXCHANGE RATE -->
    <div class="card" id="card-rate">
        <div class="header">
            <svg class="icon">
                <use href="#icon-rate" />
            </svg>
            Rate
            <span class="summary"></span>
            <button id="rate-refresh" title="Refresh rate"><svg>
                    <use href="#icon-refresh" />
                </svg></button>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="body">
            <div class="body-inner">
                <div class="row-full label-group">
                    <label>MXN per $1 USD</label>
                    <input type="number" id="rate" step="0.01" min="1">
                </div>
                <div class="row-flex">
                    <div id="rate-hint">Fetching live rate…</div>
                </div>
                <div class="row-flex">
                    <div class="row-flex">
                        <input type="checkbox" id="rate-auto-fetch" checked>
                        <label> Auto-fetch daily rate </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- REFERENCE -->
    <div class="card" id="card-reference">
        <div class="header">
            <svg class="icon">
                <use href="#icon-ref" />
            </svg>
            Reference
            <span class="summary"></span>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="body">
            <div class="body-inner">
                <div class="ref-table" id="reference-table"></div>
            </div>
        </div>
    </div>

    <!-- NOTES -->
    <div class="card" id="card-notes">
        <div class="header">
            <svg class="icon">
                <use href="#icon-note" />
            </svg>
            Notes
            <span class="summary"></span>
            <button id="notes-add" title="Add note"><svg>
                    <use href="#icon-add" />
                </svg></button>
            <button class="red" id="notes-clear" title="Clear all"><svg>
                    <use href="#icon-delete" />
                </svg></button>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="body">
            <div class="body-inner">
                <div id="notes-list"></div>
            </div>
        </div>
    </div>

    <!-- COST -->
    <div class="card" id="card-cost">
        <div class="header">
            <svg class="icon">
                <use href="#icon-cost" />
            </svg>
            Cost
            <span class="summary"></span>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="body">
            <div class="body-inner">
                <div class="row-equation">
                    <div class="label-group">
                        <label id="from-label">Pesos (MXN)</label>
                        <input type="number" id="cost-from-val" placeholder="0" min="0" step="any">
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-arrow-forward" />
                        </svg></div>
                    <div class="label-group">
                        <label id="to-label">Dollars (USD)</label>
                        <input class="output" id="cost-to-val" placeholder="—" readonly>
                    </div>
                </div>
                <div class="row-equation">
                    <div class="label-group">
                        <label>Quantity</label>
                        <div class="tab">
                            <button id="cost-qty-minus"><svg>
                                    <use href="#icon-minus" />
                                </svg></button>
                            <input type="number" class="inner" id="cost-qty" value="1" min="1">
                            <button id="cost-qty-plus"><svg>
                                    <use href="#icon-add" />
                                </svg></button>
                        </div>
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-close" />
                        </svg></div>
                    <div class="label-group">
                        <label>Total (USD)</label>
                        <input class="output" id="cost-total" placeholder="—" readonly>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MARKET WEIGHT -->
    <div class="card" id="card-market">
        <div class="header">
            <svg class="icon">
                <use href="#icon-scale" />
            </svg>
            Weight
            <span class="summary"></span>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="body">
            <div class="body-inner">
                <div class="row-equation">
                    <div class="label-group">
                        <label>Pesos / kg</label>
                        <input type="number" id="market-rate" placeholder="0" min="0" step="any">
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-close" />
                        </svg></div>
                    <div class="label-group">
                        <label>Kilograms</label>
                        <input type="number" id="market-kg" placeholder="0" min="0" step="any">
                    </div>
                </div>
                <div class="row-equation">
                    <div class="label-group">
                        <label>Total (MXN)</label>
                        <input class="output" id="market-total1" placeholder="—" readonly>
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-arrow-forward" />
                        </svg></div>
                    <div class="label-group">
                        <label>Total (USD)</label>
                        <input class="output" id="market-total2" placeholder="—" readonly>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MARKET TALLY -->
    <div class="card" id="card-tally">
        <div class="header">
            <svg class="icon">
                <use href="#icon-basket" />
            </svg>
            Basket
            <span class="summary"></span>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="body">
            <div class="body-inner">

                <!-- Toolbar -->
                <div class="row-flex">
                    <div class="tab">
                        <button class="tally-mode-btn active" data-mode="plan">Plan</button>
                        <button class="tally-mode-btn" data-mode="shop">Shop</button>
                    </div>
                    <div>
                        <button class="round-btn" id="tally-add" title="Add item"><svg>
                                <use href="#icon-add" />
                            </svg></button>
                        <button class="red" id="tally-clear" title="Clear all"><svg>
                                <use href="#icon-delete" />
                            </svg></button>
                    </div>
                </div>

                <!-- Item list -->
                <div id="tally-list"></div>

                <!-- Totals -->
                <div class="row-3col total">
                    <span>Remaining</span>
                    <span id="tally-remaining-foreign">—</span>
                    <span id="tally-remaining-local">—</span>
                </div>
                <div class="row-3col total">
                    <span>Spent</span>
                    <span id="tally-spent-foreign">—</span>
                    <span id="tally-spent-local">—</span>
                </div>

            </div>
        </div>
    </div>

    <!-- CHECK -->
    <div class="card" id="card-bill">
        <div class="header">
            <svg class="icon">
                <use href="#icon-bill" />
            </svg>
            Bill
            <span class="summary"></span>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="body">
            <div class="body-inner">

                <!-- Bill amount -->
                <div class="row-equation">
                    <div class="label-group">
                        <label>Bill (MXN)</label>
                        <input type="number" id="bill-total1" placeholder="0" min="0" step="any">
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-sync" />
                        </svg></div>
                    <div class="label-group">
                        <label>Bill (USD)</label>
                        <input type="number" id="bill-total2" placeholder="0" min="0" step="any">
                    </div>
                </div>

                <!-- People -->
                <div class="row-equation">
                    <div class="label-group">
                        <label>Split between</label>
                        <div class="tab">
                            <button id="bill-people-minus"><svg>
                                    <use href="#icon-minus" />
                                </svg></button>
                            <input type="number" class="inner" id="bill-people" value="1" min="1">
                            <button id="bill-people-plus"><svg>
                                    <use href="#icon-install" />
                                </svg></button>
                        </div>
                    </div>
                </div>

                <!-- Tip presets -->
                <div class="row-full" id="tip-options">
                    <div class="label-group">
                        <label>Tip</label>
                        <div class="options row-4col">
                            <button data-pct="10">10%</button>
                            <button data-pct="15">15%</button>
                            <button data-pct="20">20%</button>
                            <input type="number" id="bill-tip-custom" placeholder="%" min="0" max="100">
                        </div>
                    </div>
                </div>

                <!-- Tip -->
                <div class="row-equation">
                    <div class="label-group">
                        <label>Tip (MXN)</label>
                        <input class="output" id="bill-tip1" placeholder="—" readonly>
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-arrow-forward" />
                        </svg></div>
                    <div class="label-group">
                        <label>Tip (USD)</label>
                        <input class="output" id="bill-tip2" placeholder="—" readonly>
                    </div>
                </div>

                <!-- Subtotal -->
                <div class="row-equation" id="bill-subtotal">
                    <div class="label-group">
                        <label>Subtotal (MXN)</label>
                        <input class="output" id="bill-sub1" placeholder="—" readonly>
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-arrow-forward" />
                        </svg></div>
                    <div class="label-group">
                        <label>Subtotal (USD)</label>
                        <input class="output" id="bill-sub2" placeholder="—" readonly>
                    </div>
                </div>

                <!-- total -->
                <div class="row-equation">
                    <div class="label-group">
                        <label>Total (MXN)</label>
                        <input class="output" id="bill-final1" placeholder="—" readonly>
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-arrow-forward" />
                        </svg></div>
                    <div class="label-group">
                        <label>Total (USD)</label>
                        <input class="output" id="bill-final2" placeholder="—" readonly>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- DEBT TRACKER -->
    <div class="card" id="card-debt">
        <div class="header">
            <svg class="icon">
                <use href="#icon-debt" />
            </svg>
            Debt
            <span class="summary"></span>
            <button id="debt-toggle" title="Clear all"><svg>
                    <use href="#icon-add" />
                </svg></button>
            <button class="red" id="debt-clear" title="Clear all"><svg>
                    <use href="#icon-delete" />
                </svg></button>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="body">
            <div class="body-inner">

                <!-- Add form -->
                <div id="debt-form">
                    <div class="row-2col">
                        <div class="label-group">
                            <label>Person</label>
                            <input type="text" id="debt-person" placeholder="Name">
                        </div>
                        <div class="label-group">
                            <label>Note</label>
                            <input type="text" id="debt-note" placeholder="Lunch, taxi…">
                        </div>
                    </div>
                    <div class="row-equation">
                        <div class="label-group">
                            <label>Amount (MXN)</label>
                            <input type="number" id="debt-amount-foreign" placeholder="0" min="0" step="any">
                        </div>
                        <div class="arrow-label"><svg>
                                <use href="#icon-sync" />
                            </svg></div>
                        <div class="label-group">
                            <label>Amount (USD)</label>
                            <input type="number" id="debt-amount-local" placeholder="0" min="0" step="any">
                        </div>
                    </div>
                    <div class="row-2col">
                        <div class="label-group">
                            <label>Direction</label>
                            <div class="options row-2col">
                                <button class="debt-dir-btn active" data-dir="owe">I Owe</button>
                                <button class="debt-dir-btn" data-dir="owedBy">They Owe</button>
                            </div>
                        </div>
                        <div class="label-group">
                            <label class="row-right">&nbsp;</label>
                            <div class="row-right">
                                <button id="debt-add"><svg>
                                        <use href="#icon-add" />
                                    </svg></button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Entry list -->
                <div id="debt-list"></div>

            </div>
        </div>
    </div>

    <footer>
        <div>Prices are approximate · Always verify before purchasing</div>
        <div id="footer-version"></div>
    </footer>
</body>

</html>
