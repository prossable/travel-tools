<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0c0f14;
    --card: #131820;
    --border: #1e2a38;
    --accent: #3a9bd5;
    --accent2: #5fd4c8;
    --text: #e2eaf0;
    --muted: #bed1df;
    --input-bg: #0a0e14;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto Mono', monospace;
    font-weight: 700;
    font-size: 0.6rem;
    min-height: 100vh;
    padding: 24px 16px 48px;
    color: var(--muted);
}

header {
    text-align: center;
    margin-bottom: 36px;
    padding-top: 8px;
}

header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
}

header h1 span {
    color: var(--accent);
}

header p {
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
    position: relative;
    transition: border-color 0.2s;
}

.card:focus-within {
    border-color: #1e3a52;
}

.card-header {
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
}

.card-header .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
    background: var(--accent);
}

.card-summary {
  margin-left: auto;
  margin-right: 8px;
  opacity: 1;
  transition: opacity 0.2s;
  color: var(--accent);
}

.card-body {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.3s ease;
    overflow: hidden;
    border-top: 0px solid var(--border);
    transition: border-top-width 0.2s, grid-template-rows 0.3s ease;
}

.card-body.open {
    border-top-width: 1px;
    grid-template-rows: 1fr;
    margin-top: 10px;
}

.card-body > .card-body-inner {
    overflow: hidden;
}

.card-body.open ~ .card-header .card-summary,
.card-header.active .card-summary {
    opacity: 0;
    pointer-events: none;
}

.input-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: start;
}

.input-group label {
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

.big-input {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 1.1rem;
    font-weight: 700;
    padding: 10px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
}

.big-input-inner {
    border: none;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-radius: 0;
    text-align: center;
}

.big-input::-webkit-outer-spin-button,
.big-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
}

.big-input:focus {
    border-color: var(--accent);
}

.big-input.output {
    color: var(--accent2);
    background: rgba(58, 155, 213, 0.05);
    cursor: default;
    border: 1px solid rgba(58, 155, 213, 0.15);
}

.flip-btn {
    background: var(--border);
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 1rem;
    transition: background 0.2s, color 0.2s, transform 0.3s;
    flex-shrink: 0;
    margin-top: 22px;
}

.flip-btn:hover {
    background: var(--accent);
    color: var(--bg);
    transform: rotate(180deg);
}

.arrow-label {
    font-size: 1.2rem;
    color: var(--muted);
    text-align: center;
    margin-top: 22px;
    flex-shrink: 0;
}

.qty-controls {
    display: flex;
    align-items: center;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
}

.qty-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 1.3rem;
    width: 42px;
    height: 44px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.qty-btn:hover {
    background: var(--accent);
    color: var(--bg);
}

.qty-btn:active {
    background: #2a7aaa;
}

.tip-presets {
  display: grid;
  grid-template-columns: repeat(3, 1fr) 1fr;
  gap: 8px;
  margin-top: 14px;
}

.preset-btn {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--muted);
  font-family: 'Roboto Mono', monospace;
  font-size: 0.9rem;
  font-weight: 700;
  padding: 10px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}

.preset-btn.active {
  border-color: var(--accent);
  color: var(--accent);
}

.preset-custom.active {
  border-color: var(--accent);
}

footer {
    text-align: center;
    margin-top: 28px;
    color: #1e2e3e;
    letter-spacing: 0.06em;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
}

@media (max-width: 360px) {
    .big-input {
        font-size: 0.95rem;
        padding: 6px;
    }
}

</style>
</head>
<body>

<header>
  <h1>Travel <span>Tools</span></h1>
  <p>Travel calculator · MXN / USD</p>
</header>

<!-- EXCHANGE RATE -->
<div class="card">
    <div class="card-header" data-target="card-currency">
        <span class="dot"></span> Exchange Rate
        <span class="card-summary" id="summary-rate">99</span>
    </div>
    <div class="card-body" id="card-currency">
        <div class="card-body-inner">
            <div class="input-row input-group">
                <label>MXN per $1 USD</label>
                <input type="number" class="big-input" id="rate" value="17.57" step="0.01" min="1">
            </div>
            <div id="hint-rate">Fetching live rate…</div>
        </div>
    </div>
</div>

<!-- CURRENCY CONVERTER -->
<div class="card">
    <div class="card-header" data-target="card-exchange">
        <span class="dot"></span> Currency <span id="conv-direction">Pesos → Dollars</span>
    </div>
    <div class="card-body" id="card-exchange">
        <div class="card-body-inner">
            <div class="input-row">
                <div class="input-group">
                    <label id="from-label">Pesos (MXN)</label>
                    <input type="number" class="big-input" id="from-val" placeholder="0" min="0" step="any">
                </div>
                <button class="flip-btn" id="flip-btn" title="Flip direction">⇄</button>
                <div class="input-group">
                    <label id="to-label">Dollars (USD)</label>
                    <input type="number" class="big-input output" id="to-val" placeholder="—" readonly>
                </div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label>Quantity</label>
                    <div class="qty-controls">
                        <button class="qty-btn" id="qty-minus">−</button>
                        <input type="number" class="big-input big-input-inner" id="qty-val" value="1" min="1">
                        <button class="qty-btn" id="qty-plus">+</button>
                    </div>
                </div>
                <div class="arrow-label">×</div>
                <div class="input-group">
                    <label id="qty-total-label">Total (USD)</label>
                    <input class="big-input output" id="qty-total" placeholder="—" readonly>
                </div>
            </div>
         </div>
    </div>
</div>

<!-- MARKET WEIGHT -->
<div class="card">
    <div class="card-header" data-target="card-market">
        <span class="dot"></span> Market Weight
    </div>
    <div class="card-body" id="card-market">
        <div class="card-body-inner">
            <div class="input-row">
                <div class="input-group">
                    <label>Pesos / kg</label>
                    <input type="number" class="big-input" id="mxn-per-kg" placeholder="0" min="0" step="any">
                </div>
                <div class="arrow-label">×</div>
                <div class="input-group">
                    <label>Kilograms</label>
                    <input type="number" class="big-input" id="wt-kg" placeholder="0" min="0" step="any">
                </div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label>Total (MXN)</label>
                    <input class="big-input output" id="wt-mxn-total" placeholder="—" readonly>
                </div>
                <div class="arrow-label">→</div>
                <div class="input-group">
                    <label>Total (USD)</label>
                    <input class="big-input output" id="wt-usd-total" placeholder="—" readonly>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- TIP -->
<div class="card">
  <div class="card-header" data-target="card-tip">
    <span class="dot"></span> Tip Calculator
    <span class="card-summary" id="summary-tip"></span>
  </div>
  <div class="card-body" id="card-tip">
    <div class="card-body-inner">

      <!-- Row 1: Bill amount -->
      <div class="input-row">
        <div class="input-group">
          <label>Bill (MXN)</label>
          <input type="number" class="big-input" id="tip-bill-mxn" placeholder="0" min="0" step="any">
        </div>
        <div class="arrow-label">⇄</div>
        <div class="input-group">
          <label>Bill (USD)</label>
          <input type="number" class="big-input" id="tip-bill-usd" placeholder="0" min="0" step="any">
        </div>
      </div>

      <!-- Row 2: Tip presets -->
      <div class="tip-presets">
        <button class="preset-btn" data-pct="10">10%</button>
        <button class="preset-btn" data-pct="15">15%</button>
        <button class="preset-btn" data-pct="20">20%</button>
        <input type="number" class="big-input preset-custom" id="tip-pct" placeholder="%" min="0" max="100">
      </div>

      <!-- Row 3: People -->
      <div class="input-row">
        <div class="input-group">
          <label>Split between</label>
          <div class="qty-controls">
            <button class="qty-btn" id="tip-people-minus">−</button>
            <input type="number" class="big-input big-input-inner" id="tip-people" value="1" min="1">
            <button class="qty-btn" id="tip-people-plus">+</button>
          </div>
        </div>
      </div>

      <!-- Row 4: Tip outputs -->
      <div class="input-row">
        <div class="input-group">
          <label>Tip (MXN)</label>
          <input class="big-input output" id="tip-out-mxn" placeholder="—" readonly>
        </div>
        <div class="arrow-label">→</div>
        <div class="input-group">
          <label>Tip (USD)</label>
          <input class="big-input output" id="tip-out-usd" placeholder="—" readonly>
        </div>
      </div>

    </div>
  </div>
</div>

<footer>
  Prices are approximate · Always verify before purchasing
</footer>

<script>
const cards = document.querySelectorAll('.card');

const rateInput = document.getElementById('rate');
const rateHint = document.getElementById('hint-rate');
const rateSummary = document.getElementById('summary-rate');

const fromVal = document.getElementById('from-val');
const toVal = document.getElementById('to-val');
const flipBtn = document.getElementById('flip-btn');
const fromLabel = document.getElementById('from-label');
const toLabel = document.getElementById('to-label');
const convDir = document.getElementById('conv-direction');
const qtyMinus = document.getElementById('qty-minus');
const qtyPlus = document.getElementById('qty-plus');
const qtyValEl = document.getElementById('qty-val');
const qtyTotal = document.getElementById('qty-total');
const qtyTotalLabel = document.getElementById('qty-total-label');
const mxnPerKg = document.getElementById('mxn-per-kg');
const wtKg = document.getElementById('wt-kg');
const wtMxnTotal = document.getElementById('wt-mxn-total');
const wtUsdTotal = document.getElementById('wt-usd-total');

const tipBillMxn = document.getElementById('tip-bill-mxn');
const tipBillUsd = document.getElementById('tip-bill-usd');
const tipPct = document.getElementById('tip-pct');
const tipPeoplEl = document.getElementById('tip-people');
const tipOutMxn = document.getElementById('tip-out-mxn');
const tipOutUsd = document.getElementById('tip-out-usd');
const tipPeopleMinus = document.getElementById('tip-people-minus');
const tipPeoplePlus = document.getElementById('tip-people-plus');
const presetBtns = document.querySelectorAll('.preset-btn');
const summaryTip = document.getElementById('summary-tip');

let mode = 'mxn-to-usd';
let lastConvertedUnit = null;
let tipLastEdited = 'mxn';
let activePct = null; // tracks current tip %

// CARDS

cards.forEach(card => {
    card.addEventListener('click', () => {
        const body = card.querySelector('.card-body');
        const isOpen = body.classList.contains('open');
        if (isOpen) return; // already open, do nothing

        // collapse all
        document.querySelectorAll('.card-body').forEach(b => b.classList.remove('open'));
        document.querySelectorAll('.card-header').forEach(h => h.classList.remove('active'));

        // open this one
        body.classList.add('open');
        card.querySelector('.card-header').classList.add('active');
    });
});

// RATE

function getRate() {
    return parseFloat(rateInput.value) || 17.57;
}

function updateRate() {
    updateRateSummary(rateSummary, getRate());
    calcCurrency();
    calcWeight();
    calcTip();
}

function fetchRate() {
    rateHint.textContent = 'Fetching live rate…';

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);

    fetch('https://api.frankfurter.app/latest?from=USD&to=MXN', {
            signal: controller.signal
        })
        .then(r => r.json())
        .then(data => {
            clearTimeout(timeout);
            const live = data.rates.MXN;
            rateInput.value = live.toFixed(2);
            const date = new Date(data.date).toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
            rateHint.textContent = `Live rate as of ${date} · ECB · Editable`;
            updateRate();
        })
        .catch(err => {
            clearTimeout(timeout);
            const msg = err.name === 'AbortError' ?
                'Request timed out · using fallback · Editable' :
                'Could not fetch live rate · using fallback · Editable';
            rateHint.textContent = msg;
        });
}

function updateRateSummary(summaryEl, value) {
    if (summaryEl) summaryEl.textContent = value;
}

// COST

function getQty() {
    return Math.max(1, parseInt(qtyValEl.value) || 1);
}

function fmt(n, decimals = 2) {
    if (isNaN(n) || !isFinite(n)) return '—';
    return n.toLocaleString('en-US', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
    });
}

function updateQtyTotal() {
    if (lastConvertedUnit === null) {
        qtyTotal.value = '';
        return;
    }
    const total = lastConvertedUnit * getQty();
    qtyTotal.value = '$' + (mode === 'mxn-to-usd' ? fmt(total) : fmt(total, 0));
}

function calcCurrency() {
    const v = parseFloat(fromVal.value);
    if (isNaN(v) || fromVal.value === '') {
        toVal.value = '';
        lastConvertedUnit = null;
        updateQtyTotal();
        return;
    }
    const result = mode === 'mxn-to-usd' ? v / getRate() : v * getRate();
    toVal.value = fmt(result).replace(/,/g, '');
    lastConvertedUnit = result;
    updateQtyTotal();
}

function calcWeight() {
    const perKg = parseFloat(mxnPerKg.value);
    const kg = parseFloat(wtKg.value);
    if (isNaN(perKg) || isNaN(kg) || mxnPerKg.value === '' || wtKg.value === '') {
        wtMxnTotal.value = '';
        wtUsdTotal.value = '';
        return;
    }
    const totalMxn = perKg * kg;
    wtMxnTotal.value = fmt(totalMxn).replace(/,/g, '');
    wtUsdTotal.value = fmt(totalMxn / getRate()).replace(/,/g, '');
}

flipBtn.addEventListener('click', () => {
    const currentVal = parseFloat(toVal.value);
    if (mode === 'mxn-to-usd') {
        mode = 'usd-to-mxn';
        fromLabel.textContent = 'Dollars (USD)';
        toLabel.textContent = 'Pesos (MXN)';
        convDir.textContent = 'Dollars → Pesos';
        qtyTotalLabel.textContent = 'Total (MXN)';
    } else {
        mode = 'mxn-to-usd';
        fromLabel.textContent = 'Pesos (MXN)';
        toLabel.textContent = 'Dollars (USD)';
        convDir.textContent = 'Pesos → Dollars';
        qtyTotalLabel.textContent = 'Total (USD)';
    }
    fromVal.value = isNaN(currentVal) ? '' : currentVal;
    calcCurrency();
});

// TIPS

// Preset / custom selection
function setActivePreset(btn) {
  presetBtns.forEach(b => b.classList.remove('active'));
  tipPct.classList.remove('active');
  if (btn) btn.classList.add('active');
}

function setActiveCustom() {
  presetBtns.forEach(b => b.classList.remove('active'));
  tipPct.classList.add('active');
}

presetBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    activePct = parseFloat(btn.dataset.pct);
    tipPct.value = '';
    setActivePreset(btn);
    calcTip();
  });
});

tipPct.addEventListener('input', () => {
  activePct = parseFloat(tipPct.value) || null;
  setActiveCustom();
  calcTip();
});

// People counter
function getTipPeople() { return Math.max(1, parseInt(tipPeoplEl.value) || 1); }

tipPeopleMinus.addEventListener('click', () => {
  if (getTipPeople() > 1) { tipPeoplEl.value = getTipPeople() - 1; calcTip(); }
});
tipPeoplePlus.addEventListener('click', () => {
  tipPeoplEl.value = getTipPeople() + 1; calcTip();
});
tipPeoplEl.addEventListener('input', calcTip);

// Bill inputs — bidirectional
tipBillMxn.addEventListener('input', () => { tipLastEdited = 'mxn'; calcTip(); });
tipBillUsd.addEventListener('input', () => { tipLastEdited = 'usd'; calcTip(); });

// Core calc
function calcTip() {
  const rate    = getRate();
  const people  = getTipPeople();
  const pct     = activePct;

  // sync bill fields
  let billMxn;
  if (tipLastEdited === 'mxn') {
    billMxn = parseFloat(tipBillMxn.value);
    if (!isNaN(billMxn) && tipBillMxn.value !== '') {
      tipBillUsd.value = fmt(billMxn / rate).replace(/,/g, '');
    } else {
      tipBillUsd.value = '';
    }
  } else {
    const billUsd = parseFloat(tipBillUsd.value);
    if (!isNaN(billUsd) && tipBillUsd.value !== '') {
      billMxn = billUsd * rate;
      tipBillMxn.value = fmt(billMxn, 0).replace(/,/g, '');
    } else {
      billMxn = NaN;
      tipBillMxn.value = '';
    }
  }

  // bail if we don't have what we need
  if (isNaN(billMxn) || billMxn === '' || pct === null || isNaN(pct)) {
    tipOutMxn.value = '';
    tipOutUsd.value = '';
    updateSummary(summaryTip, '');
    return;
  }

  const tipTotalMxn = billMxn * (pct / 100);
  const tipTotalUsd = tipTotalMxn / rate;
  const perMxn      = tipTotalMxn / people;
  const perUsd      = tipTotalUsd / people;

  if (people > 1) {
    tipOutMxn.value = `${fmt(perMxn)} (${fmt(tipTotalMxn)})`;
    tipOutUsd.value = `${fmt(perUsd)} (${fmt(tipTotalUsd)})`;
    updateSummary(summaryTip, `$${fmt(perUsd)}/person`);
  } else {
    tipOutMxn.value = fmt(tipTotalMxn);
    tipOutUsd.value = fmt(tipTotalUsd);
    updateSummary(summaryTip, `$${fmt(tipTotalUsd)}`);
  }
}

// LISTENERS

qtyMinus.addEventListener('click', () => {
    if (getQty() > 1) {
        qtyValEl.value = getQty() - 1;
        updateQtyTotal();
    }
});
qtyPlus.addEventListener('click', () => {
    qtyValEl.value = getQty() + 1;
    updateQtyTotal();
});
qtyValEl.addEventListener('input', updateQtyTotal);
rateInput.addEventListener('input', updateRate);
fromVal.addEventListener('input', calcCurrency);
mxnPerKg.addEventListener('input', calcWeight);
wtKg.addEventListener('input', calcWeight);

fetchRate();

</script>
</body>
</html>
