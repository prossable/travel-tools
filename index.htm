<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Tools</title>
    <meta name="theme-color" content="#0c0f14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Travel Tools">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="manifest" href="./site.webmanifest">
    <meta name="theme-color" content="#0c0f14">
    <link rel="stylesheet" href="./styles.css">
    <script src="./script.js" defer></script>
</head>

<body>
    <svg width="0" height="0" style="display:none">
        <symbol id="icon-refresh" viewBox="0 0 24 24">
            <g transform="matrix(0.025,0,0,0.025,0,24)">
                <path
                    d="M480,-160C390.667,-160 315,-191 253,-253C191,-315 160,-390.667 160,-480C160,-569.333 191,-645 253,-707C315,-769 390.667,-800 480,-800C526,-800 570,-790.5 612,-771.5C654,-752.5 690,-725.333 720,-690L720,-800L800,-800L800,-520L520,-520L520,-600L688,-600C666.667,-637.333 637.5,-666.667 600.5,-688C563.5,-709.333 523.333,-720 480,-720C413.333,-720 356.667,-696.667 310,-650C263.333,-603.333 240,-546.667 240,-480C240,-413.333 263.333,-356.667 310,-310C356.667,-263.333 413.333,-240 480,-240C531.333,-240 577.667,-254.667 619,-284C660.333,-313.333 689.333,-352 706,-400L790,-400C771.333,-329.333 733.333,-271.667 676,-227C618.667,-182.333 553.333,-160 480,-160Z" />
            </g>
        </symbol>
        <symbol id="icon-close" viewBox="0 0 24 24">
            <g transform="matrix(0.025,0,0,0.025,0,24)">
                <path
                    d="M256,-200L200,-256L424,-480L200,-704L256,-760L480,-536L704,-760L760,-704L536,-480L760,-256L704,-200L480,-424L256,-200Z" />
            </g>
        </symbol>
        <symbol id="icon-delete" viewBox="0 0 24 24">
            <g transform="matrix(0.025,0,0,0.025,0,24)">
                <path
                    d="M376,-300L480,-404L584,-300L640,-356L536,-460L640,-564L584,-620L480,-516L376,-620L320,-564L424,-460L320,-356L376,-300ZM280,-120C258,-120 239.167,-127.833 223.5,-143.5C207.833,-159.167 200,-178 200,-200L200,-720L160,-720L160,-800L360,-800L360,-840L600,-840L600,-800L800,-800L800,-720L760,-720L760,-200C760,-178 752.167,-159.167 736.5,-143.5C720.833,-127.833 702,-120 680,-120L280,-120ZM680,-720L280,-720L280,-200L680,-200L680,-720ZM280,-720L280,-200L280,-720Z" />
            </g>
        </symbol>
        <symbol id="icon-add" viewBox="0 0 24 24">
            <g transform="matrix(0.025,0,0,0.025,0,24)">
                <path
                    d="M440,-120L440,-440L120,-440L120,-520L440,-520L440,-840L520,-840L520,-520L840,-520L840,-440L520,-440L520,-120L440,-120Z" />
            </g>
        </symbol>
        <symbol id="icon-clipboard" viewBox="0 0 24 24">
            <g transform="matrix(0.025,0,0,0.025,0,24)">
                <path
                    d="M200,-120C178,-120 159.167,-127.833 143.5,-143.5C127.833,-159.167 120,-178 120,-200L120,-760C120,-782 127.833,-800.833 143.5,-816.5C159.167,-832.167 178,-840 200,-840L367,-840C374.333,-863.333 388.667,-882.5 410,-897.5C431.333,-912.5 454.667,-920 480,-920C506.667,-920 530.5,-912.5 551.5,-897.5C572.5,-882.5 586.667,-863.333 594,-840L760,-840C782,-840 800.833,-832.167 816.5,-816.5C832.167,-800.833 840,-782 840,-760L840,-200C840,-178 832.167,-159.167 816.5,-143.5C800.833,-127.833 782,-120 760,-120L200,-120ZM200,-200L760,-200L760,-760L680,-760L680,-640L280,-640L280,-760L200,-760L200,-200ZM508.5,-771.5C516.167,-779.167 520,-788.667 520,-800C520,-811.333 516.167,-820.833 508.5,-828.5C500.833,-836.167 491.333,-840 480,-840C468.667,-840 459.167,-836.167 451.5,-828.5C443.833,-820.833 440,-811.333 440,-800C440,-788.667 443.833,-779.167 451.5,-771.5C459.167,-763.833 468.667,-760 480,-760C491.333,-760 500.833,-763.833 508.5,-771.5Z" />
            </g>
            <g transform="matrix(0.025,0,0,0.025,-7,24.5)">
                <path
                    d="M720,-280L720,-400L600,-400L600,-480L720,-480L720,-600L800,-600L800,-480L920,-480L920,-400L800,-400L800,-280L720,-280Z" />
            </g>
        </symbol>
        <symbol id="icon-collapse" viewBox="0 0 24 24">
            <g transform="matrix(0.025,0,0,0.025,0,24)">
                <path d="M480,-360L280,-560L680,-560L480,-360Z" />
            </g>
        </symbol>
        <symbol id="icon-check" viewBox="0 0 24 24">
            <g transform="matrix(0.025,0,0,0.025,0,24)">
                <path d="M382,-240L154,-468L211,-525L382,-354L749,-721L806,-664L382,-240Z" />
            </g>
        </symbol>
        <symbol id="icon-sync" viewBox="0 0 24 24">
            <g transform="matrix(0.025,0,0,0.025,0,24)">
                <path
                    d="M280,-120L80,-320L280,-520L337,-464L233,-360L840,-360L840,-280L233,-280L337,-176L280,-120ZM680,-440L623,-496L727,-600L120,-600L120,-680L727,-680L623,-784L680,-840L880,-640L680,-440Z" />
            </g>
        </symbol>
        <symbol id="icon-arrow-forward" viewBox="0 0 24 24">
            <g transform="matrix(0.025,0,0,0.025,0,24)">
                <path d="M647,-440L160,-440L160,-520L647,-520L423,-744L480,-800L800,-480L480,-160L423,-216L647,-440Z" />
            </g>
        </symbol>
        <symbol id="icon-duplicate" viewBox="0 0 24 24">
            <g transform="matrix(0.025,0,0,0.025,0,24)">
                <path
                    d="M360,-240C338,-240 319.167,-247.833 303.5,-263.5C287.833,-279.167 280,-298 280,-320L280,-800C280,-822 287.833,-840.833 303.5,-856.5C319.167,-872.167 338,-880 360,-880L720,-880C742,-880 760.833,-872.167 776.5,-856.5C792.167,-840.833 800,-822 800,-800L800,-320C800,-298 792.167,-279.167 776.5,-263.5C760.833,-247.833 742,-240 720,-240L360,-240ZM360,-320L720,-320L720,-800L360,-800L360,-320ZM200,-80C178,-80 159.167,-87.833 143.5,-103.5C127.833,-119.167 120,-138 120,-160L120,-720L200,-720L200,-160L640,-160L640,-80L200,-80ZM360,-320L360,-800L360,-320Z" />
            </g>
        </symbol>
    </svg>

    <header>
        <h1>Travel <span>Tools</span></h1>
        <p>Travel calculator · MXN / USD</p>
        <div class="buttons">
            <button class="wide" id="install-banner">Install App</button>
            <button class="wide" id="share-btn">Share App</button>
        </div>
    </header>

    <!-- EXCHANGE RATE -->
    <div class="card" id="card-rate">
        <div class="card-header">
            <span class="dot"></span> Exchange Rate
            <span class="card-summary" id="summary-rate"></span>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="card-body">
            <div class="card-body-inner">
                <div class="row-full label-group">
                    <label>MXN per $1 USD</label>
                    <input type="number" id="rate" step="0.01" min="1">
                </div>
                <div class="row-flex">
                    <div class="rate-hint" id="rate-hint">Fetching live rate…</div>
                    <button id="rate-refresh" title="Refresh rate"><svg>
                            <use href="#icon-refresh" />
                        </svg></button>
                </div>
            </div>
        </div>
    </div>

    <!-- QUICK REFERENCE -->
    <div class="card" id="card-reference">
        <div class="card-header">
            <span class="dot"></span> Quick Reference
            <span class="card-summary" id="summary-reference"></span>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="card-body">
            <div class="card-body-inner">
                <div class="ref-table" id="reference-table"></div>
            </div>
        </div>
    </div>

    <!-- NOTES -->
    <div class="card" id="card-notes">
        <div class="card-header">
            <span class="dot"></span> Notes
            <span class="card-summary" id="summary-notes"></span>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="card-body">
            <div class="card-body-inner">
                <div class="row-flex">
                    <div></div>
                    <div>
                        <button id="notes-add" title="Add note"><svg>
                                <use href="#icon-add" />
                            </svg></button>
                        <button class="red" id="notes-clear" title="Clear all"><svg>
                                <use href="#icon-delete" />
                            </svg></button>
                    </div>
                </div>
                <div id="notes-list"></div>
            </div>
        </div>
    </div>

    <!-- COST -->
    <div class="card" id="card-cost">
        <div class="card-header">
            <span class="dot"></span> Cost
            <span class="card-summary" id="summary-cost"></span>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="card-body">
            <div class="card-body-inner">
                <div class="row-equation">
                    <div class="label-group">
                        <label id="from-label">Pesos (MXN)</label>
                        <input type="number" id="cost-from-val" placeholder="0" min="0" step="any">
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-arrow-forward" />
                        </svg></div>
                    <div class="label-group">
                        <label id="to-label">Dollars (USD)</label>
                        <input class="output" id="cost-to-val" placeholder="—" readonly>
                    </div>
                </div>
                <div class="row-equation">
                    <div class="label-group">
                        <label>Quantity</label>
                        <div class="tab">
                            <button id="cost-qty-minus">−</button>
                            <input type="number" class="inner" id="cost-qty" value="1" min="1">
                            <button id="cost-qty-plus">+</button>
                        </div>
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-close" />
                        </svg></div>
                    <div class="label-group">
                        <label>Total (USD)</label>
                        <input class="output" id="cost-total" placeholder="—" readonly>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MARKET WEIGHT -->
    <div class="card" id="card-market">
        <div class="card-header">
            <span class="dot"></span> Market Weight
            <span class="card-summary" id="summary-market"></span>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="card-body">
            <div class="card-body-inner">
                <div class="row-equation">
                    <div class="label-group">
                        <label>Pesos / kg</label>
                        <input type="number" id="market-rate" placeholder="0" min="0" step="any">
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-close" />
                        </svg></div>
                    <div class="label-group">
                        <label>Kilograms</label>
                        <input type="number" id="market-kg" placeholder="0" min="0" step="any">
                    </div>
                </div>
                <div class="row-equation">
                    <div class="label-group">
                        <label>Total (MXN)</label>
                        <input class="output" id="market-total1" placeholder="—" readonly>
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-arrow-forward" />
                        </svg></div>
                    <div class="label-group">
                        <label>Total (USD)</label>
                        <input class="output" id="market-total2" placeholder="—" readonly>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MARKET TALLY -->
    <div class="card" id="card-tally">
        <div class="card-header">
            <span class="dot"></span> Market Tally
            <span class="card-summary" id="summary-tally"></span>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="card-body">
            <div class="card-body-inner">

                <!-- Toolbar -->
                <div class="row-flex">
                    <div class="tab">
                        <button class="tally-mode-btn active" data-mode="plan">Plan</button>
                        <button class="tally-mode-btn" data-mode="shop">Shop</button>
                    </div>
                    <div>
                        <button class="round-btn" id="tally-add" title="Add item"><svg>
                                <use href="#icon-add" />
                            </svg></button>
                        <button class="red" id="tally-clear" title="Clear all"><svg>
                                <use href="#icon-delete" />
                            </svg></button>
                    </div>
                </div>

                <!-- Item list -->
                <div id="tally-list"></div>

                <!-- Totals -->
                <div class="row-3col tally">
                    <span>Remaining</span>
                    <span id="tally-remaining-foreign">—</span>
                    <span id="tally-remaining-local">—</span>
                </div>
                <div class="row-3col tally">
                    <span>Spent</span>
                    <span id="tally-spent-foreign">—</span>
                    <span id="tally-spent-local">—</span>
                </div>

            </div>
        </div>
    </div>

    <!-- CHECK -->
    <div class="card" id="card-bill">
        <div class="card-header">
            <span class="dot"></span> Bill Splitter
            <span class="card-summary" id="summary-bill"></span>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="card-body">
            <div class="card-body-inner">

                <!-- Bill amount -->
                <div class="row-equation">
                    <div class="label-group">
                        <label>Bill (MXN)</label>
                        <input type="number" id="bill-total1" placeholder="0" min="0" step="any">
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-sync" />
                        </svg></div>
                    <div class="label-group">
                        <label>Bill (USD)</label>
                        <input type="number" id="bill-total2" placeholder="0" min="0" step="any">
                    </div>
                </div>

                <!-- People -->
                <div class="row-equation">
                    <div class="label-group">
                        <label>Split between</label>
                        <div class="tab">
                            <button id="bill-people-minus">−</button>
                            <input type="number" class="inner" id="bill-people" value="1" min="1">
                            <button id="bill-people-plus">+</button>
                        </div>
                    </div>
                </div>

                <!-- Tip presets -->
                <div class="row-full" id="tip-options">
                    <div class="label-group">
                        <label>Tip</label>
                        <div class="options">
                            <button data-pct="10">10%</button>
                            <button data-pct="15">15%</button>
                            <button data-pct="20">20%</button>
                            <input type="number" id="bill-tip-custom" placeholder="%" min="0" max="100">
                        </div>
                    </div>
                </div>

                <!-- Tip -->
                <div class="row-equation">
                    <div class="label-group">
                        <label>Tip (MXN)</label>
                        <input class="output" id="bill-tip1" placeholder="—" readonly>
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-arrow-forward" />
                        </svg></div>
                    <div class="label-group">
                        <label>Tip (USD)</label>
                        <input class="output" id="bill-tip2" placeholder="—" readonly>
                    </div>
                </div>

                <!-- Subtotal -->
                <div class="row-equation" id="bill-subtotal">
                    <div class="label-group">
                        <label>Subtotal (MXN)</label>
                        <input class="output" id="bill-sub1" placeholder="—" readonly>
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-arrow-forward" />
                        </svg></div>
                    <div class="label-group">
                        <label>Subtotal (USD)</label>
                        <input class="output" id="bill-sub2" placeholder="—" readonly>
                    </div>
                </div>

                <!-- total -->
                <div class="row-equation">
                    <div class="label-group">
                        <label>Total (MXN)</label>
                        <input class="output" id="bill-final1" placeholder="—" readonly>
                    </div>
                    <div class="arrow-label"><svg>
                            <use href="#icon-arrow-forward" />
                        </svg></div>
                    <div class="label-group">
                        <label>Total (USD)</label>
                        <input class="output" id="bill-final2" placeholder="—" readonly>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- DEBT TRACKER -->
    <div class="card" id="card-debt">
        <div class="card-header">
            <span class="dot"></span> Debt Tracker
            <span class="card-summary" id="summary-debt"></span>
            <button class="collapse-btn" title="Collapse"><svg>
                    <use href="#icon-close" />
                </svg></button>
        </div>
        <div class="card-body">
            <div class="card-body-inner">

                <!-- Add form -->
                <div class="debt-form">
                    <div class="row-2col">
                        <div class="label-group">
                            <label>Person</label>
                            <input type="text" id="debt-person" placeholder="Name">
                        </div>
                        <div class="label-group">
                            <label>Note</label>
                            <input type="text" id="debt-note" placeholder="Lunch, taxi…">
                        </div>
                    </div>
                    <div class="row-equation">
                        <div class="label-group">
                            <label>Amount (MXN)</label>
                            <input type="number" id="debt-amount-foreign" placeholder="0" min="0" step="any">
                        </div>
                        <div class="arrow-label"><svg>
                                <use href="#icon-sync" />
                            </svg></div>
                        <div class="label-group">
                            <label>Amount (USD)</label>
                            <input type="number" id="debt-amount-local" placeholder="0" min="0" step="any">
                        </div>
                    </div>
                    <div class="row-2col">
                        <div class="label-group">
                            <label>Direction</label>
                            <div class="tab">
                                <button class="debt-dir-btn active" data-dir="owe">I Owe</button>
                                <button class="debt-dir-btn" data-dir="owedBy">They Owe</button>
                            </div>
                        </div>
                        <div class="label-group">
                            <label>Add</label>
                            <div>
                                <button id="debt-add" class="wide">+ Add Entry</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Entry list -->
                <div id="debt-list"></div>

            </div>
        </div>
    </div>

    <footer>
        <div>Prices are approximate · Always verify before purchasing</div>
        <div id="footer-version"></div>
    </footer>
</body>

</html>
