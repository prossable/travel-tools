<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Tools</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0c0f14;
            --card: #131820;
            --border: #1e2a38;
            --accent: #3a9bd5;
            --accent2: #5fd4c8;
            --text: #e2eaf0;
            --muted: #bed1df;
            --input-bg: #0a0e14;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            font-size: 0.7rem;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px 48px;
            color: var(--muted);
        }

        header {
            text-align: center;
            margin-bottom: 36px;
            padding-top: 8px;
        }

        header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        header h1 span {
            color: var(--accent);
        }

        header p {
            color: var(--muted);
            margin-top: 4px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
            position: relative;
            transition: border-color 0.2s;
        }

        .card:focus-within {
            border-color: #1e3a52;
        }

        .card-header {
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
            background: var(--accent);
        }

        .card-summary {
            margin-left: auto;
            margin-right: 8px;
            opacity: 1;
            transition: opacity 0.2s;
            color: var(--accent);
        }

        .card-body {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease;
            overflow: hidden;
            border-top: 0px solid var(--border);
            transition: border-top-width 0.2s, grid-template-rows 0.3s ease;
        }

        .card-body.open {
            border-top-width: 1px;
            grid-template-rows: 1fr;
            margin-top: 10px;
        }

        .card-body>.card-body-inner {
            overflow: hidden;
        }

        .card-body.open~.card-header .card-summary,
        .card-header.active .card-summary {
            opacity: 0;
            pointer-events: none;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 12px;
            margin-top: 14px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: start;
        }

        .input-group label {
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .big-input {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 1.1rem;
            font-weight: 700;
            padding: 10px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
        }

        .big-input-inner {
            border: none;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            border-radius: 0;
            text-align: center;
        }

        .big-input::-webkit-outer-spin-button,
        .big-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        .big-input:focus {
            border-color: var(--accent);
        }

        .big-input.output {
            color: var(--accent2);
            background: rgba(58, 155, 213, 0.05);
            cursor: default;
            border: 1px solid rgba(58, 155, 213, 0.15);
        }

        .btn-round {
            background: var(--border);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--muted);
            font-size: 1rem;
            transition: background 0.2s, color 0.2s, transform 0.3s;
            flex-shrink: 0;
            margin-top: 22px;
        }

        .btn-round:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .arrow-label {
            font-size: 1.2rem;
            color: var(--muted);
            text-align: center;
            margin-top: 22px;
            flex-shrink: 0;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .qty-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.3rem;
            width: 42px;
            height: 44px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .qty-btn:active {
            background: #2a7aaa;
        }

        .tip-presets {
            display: grid;
            grid-template-columns: repeat(3, 1fr) 1fr;
            gap: 8px;
            margin-top: 14px;
        }

        .preset-btn {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--muted);
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            padding: 10px;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .preset-btn.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        .preset-custom.active {
            border-color: var(--accent);
        }

        footer {
            text-align: center;
            margin-top: 28px;
            color: #1e2e3e;
            letter-spacing: 0.06em;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 360px) {
            .big-input {
                font-size: 0.95rem;
                padding: 6px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Travel <span>Tools</span></h1>
        <p>Travel calculator · MXN / USD</p>
    </header>

    <!-- EXCHANGE RATE -->
    <div class="card">
        <div class="card-header" data-target="card-rate">
            <span class="dot"></span> Exchange Rate
            <span class="card-summary" id="summary-rate"></span>
        </div>
        <div class="card-body" id="card-rate">
            <div class="card-body-inner">
                <div class="input-row input-group">
                    <label>MXN per $1 USD</label>
                    <input type="number" class="big-input" id="rate" value="17.57" step="0.01" min="1">
                </div>
                <div id="hint-rate">Fetching live rate…</div>
            </div>
        </div>
    </div>

    <!-- COST -->
    <div class="card">
        <div class="card-header" data-target="card-cost">
            <span class="dot"></span> Cost
            <span class="card-summary" id="summary-cost"></span>
        </div>
        <div class="card-body" id="card-cost">
            <div class="card-body-inner">
                <div class="input-row">
                    <div class="input-group">
                        <label id="from-label">Pesos (MXN)</label>
                        <input type="number" class="big-input" id="cost-from-val" placeholder="0" min="0" step="any">
                    </div>
                    <div class="arrow-label">→</div>
                    <div class="input-group">
                        <label id="to-label">Dollars (USD)</label>
                        <input type="number" class="big-input output" id="cost-to-val" placeholder="—" readonly>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Quantity</label>
                        <div class="qty-controls">
                            <button class="qty-btn" id="cost-qty-minus">−</button>
                            <input type="number" class="big-input big-input-inner" id="cost-qty" value="1" min="1">
                            <button class="qty-btn" id="cost-qty-plus">+</button>
                        </div>
                    </div>
                    <div class="arrow-label">×</div>
                    <div class="input-group">
                        <label>Total (USD)</label>
                        <input class="big-input output" id="cost-total" placeholder="—" readonly>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MARKET WEIGHT -->
    <div class="card">
        <div class="card-header" data-target="card-market">
            <span class="dot"></span> Market Weight
            <span class="card-summary" id="summary-market"></span>
        </div>
        <div class="card-body" id="card-market">
            <div class="card-body-inner">
                <div class="input-row">
                    <div class="input-group">
                        <label>Pesos / kg</label>
                        <input type="number" class="big-input" id="market-rate" placeholder="0" min="0" step="any">
                    </div>
                    <div class="arrow-label">×</div>
                    <div class="input-group">
                        <label>Kilograms</label>
                        <input type="number" class="big-input" id="market-kg" placeholder="0" min="0" step="any">
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Total (MXN)</label>
                        <input class="big-input output" id="market-total1" placeholder="—" readonly>
                    </div>
                    <div class="arrow-label">→</div>
                    <div class="input-group">
                        <label>Total (USD)</label>
                        <input class="big-input output" id="market-total2" placeholder="—" readonly>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CHECK -->
    <div class="card">
        <div class="card-header" data-target="card-bill">
            <span class="dot"></span> Tip Calculator
            <span class="card-summary" id="summary-bill"></span>
        </div>
        <div class="card-body" id="card-bill">
            <div class="card-body-inner">

                <!-- Bill amount -->
                <div class="input-row">
                    <div class="input-group">
                        <label>Bill (MXN)</label>
                        <input type="number" class="big-input" id="bill-mxn" placeholder="0" min="0" step="any">
                    </div>
                    <div class="arrow-label">⇄</div>
                    <div class="input-group">
                        <label>Bill (USD)</label>
                        <input type="number" class="big-input" id="bill-usd" placeholder="0" min="0" step="any">
                    </div>
                </div>

                <!-- People -->
                <div class="input-row">
                    <div class="input-group">
                        <label>Split between</label>
                        <div class="qty-controls">
                            <button class="qty-btn" id="bill-people-minus">−</button>
                            <input type="number" class="big-input big-input-inner" id="bill-people" value="1" min="1">
                            <button class="qty-btn" id="bill-people-plus">+</button>
                        </div>
                    </div>
                </div>

                <!-- Tip presets -->
                <div class="tip-presets">
                    <button class="preset-btn" data-pct="10">10%</button>
                    <button class="preset-btn" data-pct="15">15%</button>
                    <button class="preset-btn" data-pct="20">20%</button>
                    <input type="number" class="big-input preset-custom" id="tip-pct" placeholder="%" min="0" max="100">
                </div>

                <!-- Tip outputs -->
                <div class="input-row">
                    <div class="input-group">
                        <label>Tip (MXN)</label>
                        <input class="big-input output" id="tip-out-mxn" placeholder="—" readonly>
                    </div>
                    <div class="arrow-label">→</div>
                    <div class="input-group">
                        <label>Tip (USD)</label>
                        <input class="big-input output" id="tip-out-usd" placeholder="—" readonly>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer>
        Prices are approximate · Always verify before purchasing
    </footer>

    <script>
        // VARS
        const cards = document.querySelectorAll('.card');

        const rateSummaryOutput = document.getElementById('summary-rate');
        const rateInput = document.getElementById('rate');
        const rateHintOutput = document.getElementById('hint-rate');

        const costSummaryOutput = document.getElementById('summary-cost');
        const costInput = document.getElementById('cost-from-val');
        const costOutput = document.getElementById('cost-to-val');
        const costQuantityInput = document.getElementById('cost-qty');
        const costQuantityMinusButton = document.getElementById('cost-qty-minus');
        const costQuantityPlusButton = document.getElementById('cost-qty-plus');
        const costTotalOutput = document.getElementById('cost-total');

        const marketSummaryOutput = document.getElementById('summary-market');
        const marketRateInput = document.getElementById('market-rate');
        const marketKgInput = document.getElementById('market-kg');
        const marketTotal1Output = document.getElementById('market-total1');
        const marketTotal2Output = document.getElementById('market-total2');

        const billSummaryOutput = document.getElementById('summary-bill');
        const bill1Input = document.getElementById('bill-mxn');
        const bill2Input = document.getElementById('bill-usd');
        const tipPeoplInput = document.getElementById('bill-people');
        const tipPeopleMinusButton = document.getElementById('bill-people-minus');
        const tipPeoplePlusButton = document.getElementById('bill-people-plus');
        const tipPct = document.getElementById('tip-pct');
        const tipOutMxn = document.getElementById('tip-out-mxn');
        const tipOutUsd = document.getElementById('tip-out-usd');
        const presetBtns = document.querySelectorAll('.preset-btn');

        let lastCost = null;
        let lastBillCurrency = 'mxn';
        let lastBillPercent = null; // tracks current tip %

        // CARDS

        cards.forEach(card => {
            card.addEventListener('click', () => {
                const body = card.querySelector('.card-body');
                const isOpen = body.classList.contains('open');
                if (isOpen) return; // already open, do nothing

                // collapse all
                document.querySelectorAll('.card-body').forEach(b => b.classList.remove('open'));
                document.querySelectorAll('.card-header').forEach(h => h.classList.remove('active'));

                // open this one
                body.classList.add('open');
                card.querySelector('.card-header').classList.add('active');
            });
        });

        // RATE

        function getRate() {
            return parseFloat(rateInput.value) || 17.57;
        }

        function fetchRate() {
            rateHintOutput.textContent = 'Fetching live rate…';

            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 5000);

            fetch('https://api.frankfurter.app/latest?from=USD&to=MXN', {
                signal: controller.signal
            })
                .then(r => r.json())
                .then(data => {
                    clearTimeout(timeout);
                    const live = data.rates.MXN;
                    rateInput.value = live.toFixed(2);
                    const date = new Date(data.date).toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    });
                    rateHintOutput.textContent = `Live rate as of ${date} · ECB · Editable`;
                    refresh();
                })
                .catch(err => {
                    clearTimeout(timeout);
                    const msg = err.name === 'AbortError' ?
                        'Request timed out · using fallback · Editable' :
                        'Could not fetch live rate · using fallback · Editable';
                    rateHintOutput.textContent = msg;
                });
        }

        // COST

        function calcCost() {
            const v = parseFloat(costInput.value);
            if (isNaN(v) || costInput.value === '') {
                lastCost = null;
                updateCost();
                return;
            }
            lastCost = v / getRate();
            updateCost();
        }

        function updateCost() {
            if (lastCost === null) {
                costOutput.value = '';
                costTotalOutput.value = '';
                return;
            }
            costOutput.value = format(lastCost).replace(/,/g, '');
            const total = lastCost * getCostQuantity();
            costTotalOutput.value = '$' + format(total);
            updateSummary(costSummaryOutput, '$' + format(total) + ' USD');
        }

        function getCostQuantity() {
            return Math.max(1, parseInt(costQuantityInput.value) || 1);
        }

        // MARKET

        function calcMarket() {
            const perKg = parseFloat(marketRateInput.value);
            const kg = parseFloat(marketKgInput.value);
            if (isNaN(perKg) || isNaN(kg) || marketRateInput.value === '' || marketKgInput.value === '') {
                marketTotal1Output.value = '';
                marketTotal2Output.value = '';
                updateSummary(marketSummaryOutput, '');
                return;
            }
            const totalMxn = perKg * kg;
            const totalUsd = '$' + format(totalMxn / getRate()).replace(/,/g, '');
            marketTotal1Output.value = '$' + format(totalMxn).replace(/,/g, '');
            marketTotal2Output.value = totalUsd;
            updateSummary(marketSummaryOutput, totalUsd + ' USD');
        }

        // BILL

        // Preset / custom selection
        function setActivePreset(btn) {
            presetBtns.forEach(b => b.classList.remove('active'));
            tipPct.classList.remove('active');
            if (btn) btn.classList.add('active');
        }

        function setActiveCustom() {
            presetBtns.forEach(b => b.classList.remove('active'));
            tipPct.classList.add('active');
        }

        presetBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                lastBillPercent = parseFloat(btn.dataset.pct);
                tipPct.value = '';
                setActivePreset(btn);
                calcTip();
            });
        });

        tipPct.addEventListener('input', () => {
            lastBillPercent = parseFloat(tipPct.value) || null;
            setActiveCustom();
            calcTip();
        });

        // People counter
        function getTipPeople() { return Math.max(1, parseInt(tipPeoplInput.value) || 1); }

        tipPeopleMinusButton.addEventListener('click', () => {
            if (getTipPeople() > 1) { tipPeoplInput.value = getTipPeople() - 1; calcTip(); }
        });
        tipPeoplePlusButton.addEventListener('click', () => {
            tipPeoplInput.value = getTipPeople() + 1; calcTip();
        });
        tipPeoplInput.addEventListener('input', calcTip);

        // Bill inputs — bidirectional
        bill1Input.addEventListener('input', () => { lastBillCurrency = 'mxn'; calcTip(); });
        bill2Input.addEventListener('input', () => { lastBillCurrency = 'usd'; calcTip(); });

        // Core calc
        function calcTip() {
            const rate = getRate();
            const people = getTipPeople();
            const pct = lastBillPercent;

            // sync bill fields
            let billMxn;
            if (lastBillCurrency === 'mxn') {
                billMxn = parseFloat(bill1Input.value);
                if (!isNaN(billMxn) && bill1Input.value !== '') {
                    bill2Input.value = format(billMxn / rate).replace(/,/g, '');
                } else {
                    bill2Input.value = '';
                }
            } else {
                const billUsd = parseFloat(bill2Input.value);
                if (!isNaN(billUsd) && bill2Input.value !== '') {
                    billMxn = billUsd * rate;
                    bill1Input.value = format(billMxn, 0).replace(/,/g, '');
                } else {
                    billMxn = NaN;
                    bill1Input.value = '';
                }
            }

            // bail if we don't have what we need
            if (isNaN(billMxn) || billMxn === '' || pct === null || isNaN(pct)) {
                tipOutMxn.value = '';
                tipOutUsd.value = '';
                updateSummary(billSummaryOutput, '');
                return;
            }

            const tipTotalMxn = billMxn * (pct / 100);
            const tipTotalUsd = tipTotalMxn / rate;
            const perMxn = tipTotalMxn / people;
            const perUsd = tipTotalUsd / people;

            if (people > 1) {
                tipOutMxn.value = `${format(perMxn)} (${format(tipTotalMxn)})`;
                tipOutUsd.value = `${format(perUsd)} (${format(tipTotalUsd)})`;
                updateSummary(billSummaryOutput, `$${format(perUsd)}/person`);
            } else {
                tipOutMxn.value = format(tipTotalMxn);
                tipOutUsd.value = format(tipTotalUsd);
                updateSummary(billSummaryOutput, `$${format(tipTotalUsd)}`);
            }
        }

        // GLOBAL

        function refresh() {
            updateSummary(rateSummaryOutput, '$' + getRate() + " MXN");
            calcCost();
            calcMarket();
            calcTip();
        }

        function format(n, decimals = 2) {
            if (isNaN(n) || !isFinite(n)) return '—';
            return n.toLocaleString('en-US', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
            });
        }

        function updateSummary(summaryEl, value) {
            if (summaryEl) summaryEl.textContent = value;
        }

        // LISTENERS

        rateInput.addEventListener('input', refresh);
        costQuantityMinusButton.addEventListener('click', () => {
            if (getCostQuantity() > 1) {
                costQuantityInput.value = getCostQuantity() - 1;
                updateCost();
            }
        });
        costQuantityPlusButton.addEventListener('click', () => {
            costQuantityInput.value = getCostQuantity() + 1;
            updateCost();
        });
        costQuantityInput.addEventListener('input', updateCost);
        costInput.addEventListener('input', calcCost);
        marketRateInput.addEventListener('input', calcMarket);
        marketKgInput.addEventListener('input', calcMarket);



        //fetchRate();

    </script>
</body>

</html>
